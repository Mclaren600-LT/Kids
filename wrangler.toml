name = "bike-challenge"
main = "worker-src/index.js"
compatibility_date = "2024-09-23"

# Static assets — the Vite build output in ./dist is served by the Worker.
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# KV for storing the family's state.
# Create the namespace in dashboard: Storage & Databases → KV → Create namespace
# (call it bike-challenge-data), then paste its id below.
[[kv_namespaces]]
binding = "DATA"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

# Secrets (FAMILY_PIN, etc.) are set in dashboard under Worker → Settings → Variables and Secrets.
